name: Build Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: ''
          - platform: 'windows-latest'
            args: ''
          # Use Ubuntu 22.04 for broader Linux compatibility (glibc 2.35)
          # This supports Debian 12+, Ubuntu 22.04+, Fedora 36+, etc.
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            arch: 'arm64'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.args == '--target aarch64-apple-darwin' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          # Include target arch in cache key for cross-compilation
          shared-key: ${{ matrix.args == '--target aarch64-apple-darwin' && 'macos-arm64' || '' }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - name: Install libvips (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vipsVersion = "8.18.0"
          $url = "https://github.com/libvips/build-win64-mxe/releases/download/v${vipsVersion}/vips-dev-w64-web-${vipsVersion}.zip"
          Invoke-WebRequest -Uri $url -OutFile vips.zip
          Expand-Archive -Path vips.zip -DestinationPath vendor\libvips-extract
          Move-Item vendor\libvips-extract\vips-dev-8.18 vendor\libvips-native
          Remove-Item vips.zip
          Remove-Item -Recurse vendor\libvips-extract
          echo "${{ github.workspace }}\vendor\libvips-native\bin" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Install libvips (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install vips
          echo "VIPS_DIR=$(brew --prefix vips)" >> $GITHUB_ENV

      - name: Install dependencies (root)
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Get changelog for release notes
        id: changelog
        shell: bash
        run: |
          if [ -f CHANGELOG.md ]; then
            echo "body<<CHANGELOG_EOF" >> $GITHUB_OUTPUT
            cat CHANGELOG.md >> $GITHUB_OUTPUT
            echo "CHANGELOG_EOF" >> $GITHUB_OUTPUT
          else
            echo "body=See the assets to download this version and install." >> $GITHUB_OUTPUT
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          args: ${{ matrix.args }}
          includeDebug: false
          tagName: v__VERSION__
          releaseName: 'Image Optimizer v__VERSION__'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: true
          prerelease: false


